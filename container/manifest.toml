# SPDX-License-Identifier: PMPL-1.0-or-later
#
# Cerro Torre manifest for cloudguard-server .ctp bundle
#
# This manifest describes the container image for verified
# container packaging. Used by `ct pack` to create .ctp bundles.

[metadata]
name = "cloudguard-server"
version = "0.1.0"
revision = 1
summary = "CloudGuard Server — REST + WebSocket API for Cloudflare domain security management"
description = """
cloudguard-server — containerised service packaged as a verified
cerro-torre .ctp bundle with Ed25519 signing and full provenance
tracking.
"""
license = "{{LICENSE}}"
homepage = "https://github.com/hyperpolymath/cloudguard-server"
maintainer = "Jonathan D.A. Jewell <{{EMAIL}}>"

[provenance]
upstream = "https://github.com/hyperpolymath/cloudguard-server"
import_date = 2026-03-02T00:00:00Z

[dependencies]
runtime = ["ca-certificates", "curl"]
build = []

[build]
system = "podman"

[build.environment]
APP_HOST = "[::]"
APP_PORT = "3847"

[outputs]
primary = "cloudguard-server"
split = []

[attestations]
require = ["source-signature", "sbom-complete"]
recommend = ["security-audit", "reproducible-build"]

# Runtime security profile
[security]
user = "appuser"
group = "appuser"
read_only_root = false
no_new_privileges = true

[security.capabilities]
drop = ["ALL"]
add = ["NET_BIND_SERVICE"]

[security.network]
listen_tcp = [3847]

[security.filesystem]
read = ["/app/", "/data/"]
write = ["/data/", "/tmp/"]
execute = ["/app/entrypoint.sh"]
